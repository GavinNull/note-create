# =============================================================================
# FDS Course Profile — 数据结构基础 (Fundamentals of Data Structures)
# =============================================================================
# This profile captures everything specific to the FDS course.
# To adapt the pipeline to a different course, create a new profile file
# and point workflow.js at it: workflow.js --profile profiles/my-course.yaml
# =============================================================================

profile:
  name: "fds"
  display: "数据结构基础 (Fundamentals of Data Structures)"
  description: "Bilingual CN/EN data structures course using C language, §-prefixed sections, complexity analysis focus"
  domain: "cs_theory"

  # ── Languages ──────────────────────────────────────────────────────────
  languages:
    source: "en"              # Textbook is in English
    target: "zh-CN"           # Notes are in Chinese
    annotation: "en"          # Terms are annotated with English equivalents
    annotation_style: "parens" # 中文（English Term）
    field_suffix_source: "_en"    # JSON field suffix for source language
    field_suffix_target: "_cn"    # JSON field suffix for target language

  # ── Source Text Parsing ────────────────────────────────────────────────
  source:
    chapter_pattern: "Chapter (\\d+)"     # How chapters are marked in raw text
    section_pattern: "§(\\d+)"            # How sections are marked
    section_style: "§-prefixed"           # "§-prefixed" | "dotted" | "numbered"
    code_language: "c"                    # Default programming language
    code_comment_style: "/* %s */"        # Comment format (%s = text)
    math: { inline: "$", display: "$$" }  # Math delimiters

  # ── Content Model ──────────────────────────────────────────────────────
  # Block types to extract in Stage 1, in priority order.
  # Types not listed are ignored.
  content_types:
    - definition
    - theorem
    - code
    - complexity_table
    - example
    - comparison_table
    - note
    - figure
    - interactive_demo
    - ascii_diagram
    - derivation
    - paragraph

  # ── Chapter Template ───────────────────────────────────────────────────
  template:
    title: "# 第{chapter}章：{title_cn} (Chapter {chapter}: {title_en})"
    epigraph: "> **{epigraph_en}** {epigraph_cn}"
    section: "## §{number} {title_cn} {title_en}"
    subsection: "### {title_cn} ({title_en})"
    separator: "---"
    toc_heading: "## 目录"
    toc_entry: "{idx}. [{section} {title_en} {title_cn}](#{anchor})"

    end_sections:
      - id: algorithm_summary
        heading: "## 算法总结 (Algorithm Summary)"
        optional: true
      - id: term_glossary
        heading: "## 关键术语 (Key Terminology)"
        optional: false
      - id: exam_points
        heading: "## 考点总结 (Exam Summary)"
        optional: true

  # ── Label Dictionary ───────────────────────────────────────────────────
  labels:
    definition:    { en: "Definition",    cn: "定义" }
    theorem:       { en: "Theorem",       cn: "定理" }
    lemma:         { en: "Lemma",         cn: "引理" }
    corollary:     { en: "Corollary",     cn: "推论" }
    proof:         { en: "Proof",         cn: "证明" }
    contradiction: { en: "Contradiction", cn: "矛盾" }
    note:          { en: "Note",          cn: "注" }
    tip:           { en: "Tip",           cn: "提示" }
    example:       { en: "Example",       cn: "示例" }
    figure:        { en: "Figure",        cn: "图" }
    table:         { en: "Table",         cn: "表" }
    algorithm:     { en: "Algorithm",     cn: "算法" }

  # ── Table Templates ────────────────────────────────────────────────────
  tables:
    complexity:
      headers: ["情况 (Case)", "条件 (Condition)", "时间复杂度 (Time Complexity)"]
    algorithm_comparison:
      headers: ["算法 (Algorithm)", "最坏时间 (Worst)", "平均时间 (Average)",
                "最好时间 (Best)", "空间 (Space)", "稳定性 (Stability)"]
    term_glossary:
      headers: ["术语 (Term)", "定义 (Definition)"]
    operation_adt:
      headers: ["操作 (Operation)", "签名 (Signature)", "说明 (Description)"]

  # ── Formatting Rules ───────────────────────────────────────────────────
  formatting:
    definition_order: "en_first"           # English definition before Chinese
    term_annotation: "first_per_section"   # Annotate terms once per section
    table_first_column_bold: true
    blank_lines_around_blocks: true

  # ── Image References ───────────────────────────────────────────────────
  images:
    path_pattern: "images/ch{chapter:02d}-{slug}.png"
    alt_text: "{description_cn}"
    demo_link: "> [点击打开 {name}]({path}) — {description}"

  # ── Review Rules ───────────────────────────────────────────────────────
  review:
    check_term_consistency: true
    check_latex: true
    check_code_comments: true
    check_missing_summaries: true
    punctuation:
      chinese_in_chinese_text: true   # Use ：（） not :() in Chinese
      no_html_tags: true

  # ── Complexity Class Reference ─────────────────────────────────────────
  complexity_classes:
    - { class: "O(1)",              label: "常数时间 (Constant)",            examples: "数组索引、哈希查找（平均）" }
    - { class: "O(\\log N)",        label: "对数时间 (Logarithmic)",         examples: "二分查找、堆操作、BST查找（平均）" }
    - { class: "O(N)",              label: "线性时间 (Linear)",              examples: "线性扫描、BuildHeap、在线最大子序列和" }
    - { class: "O(N \\log N)",      label: "线性对数时间 (Linearithmic)",    examples: "归并排序、快速排序（平均）、堆排序" }
    - { class: "O(N^2)",            label: "平方时间 (Quadratic)",           examples: "插入排序、冒泡排序、朴素Dijkstra" }
    - { class: "O(N^3)",            label: "立方时间 (Cubic)",              examples: "Floyd-Warshall、矩阵乘法" }
    - { class: "O(2^N)",            label: "指数时间 (Exponential)",         examples: "朴素斐波那契递归" }
    - { class: "\\Omega(N \\log N)", label: "比较排序下界 (Sorting Lower Bound)", examples: "所有基于比较的排序算法" }

