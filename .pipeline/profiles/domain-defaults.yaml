# =============================================================================
# Domain Defaults — 12 Pre-Built Domain Presets
# =============================================================================
# Each domain defines sensible defaults for content types, chapter templates,
# labels, and review rules. When creating a new profile, pick a domain and
# inherit its defaults. You only need to add terminology.
#
# Usage in a profile:
#   profile:
#     domain: "math_pure"
#     inherits: "domain-defaults"
#     # ... then add your terminology, override specific settings
# =============================================================================

domains:

  # ── Computer Science: Theory & Algorithms ──────────────────────────
  cs_theory:
    description: "算法、数据结构、计算理论、复杂度"
    content_types:
      - definition
      - theorem
      - code
      - complexity_table
      - example
      - comparison_table
      - note
      - figure
      - derivation
      - paragraph
    template:
      title: "# 第{chapter}章：{title_cn} (Chapter {chapter}: {title_en})"
      section: "## §{number} {title_cn} {title_en}"
      end_sections:
        - { heading: "## 算法总结 (Algorithm Summary)", optional: true }
        - { heading: "## 关键术语 (Key Terminology)", optional: false }
        - { heading: "## 考点总结 (Exam Summary)", optional: true }
    labels:
      definition:    { en: "Definition",    cn: "定义" }
      theorem:       { en: "Theorem",       cn: "定理" }
      lemma:         { en: "Lemma",         cn: "引理" }
      corollary:     { en: "Corollary",     cn: "推论" }
      proof:         { en: "Proof",         cn: "证明" }
      note:          { en: "Note",          cn: "注" }
      example:       { en: "Example",       cn: "示例" }
      figure:        { en: "Figure",        cn: "图" }
    tables:
      complexity:  { headers: ["情况 (Case)", "条件 (Condition)", "时间复杂度 (Time)"] }
      comparison:  { headers: ["算法 (Algorithm)", "最坏 (Worst)", "平均 (Average)", "空间 (Space)", "稳定性 (Stable)"] }
      glossary:    { headers: ["术语 (Term)", "定义 (Definition)"] }
    stage1_hint: "Look for pseudocode blocks, complexity analysis tables, and theorem-proof structures. Capture all O(n)/Θ(n)/Ω(n) complexity mentions."
    stage3_hint: "Use complexity comparison tables. Render ADT operation tables. Add algorithm trace examples."
    stage4_hint: "Verify complexity notation consistency. Check algorithm stability annotations. Validate code syntax."

  # ── Computer Science: Systems & Engineering ────────────────────────
  cs_systems:
    description: "操作系统、网络、数据库、编译器、体系结构"
    content_types:
      - definition
      - code
      - figure
      - note
      - example
      - comparison_table
      - paragraph
    template:
      title: "# 第{chapter}章：{title_cn} (Chapter {chapter}: {title_en})"
      section: "## §{number} {title_cn} {title_en}"
      end_sections:
        - { heading: "## 系统设计要点 (Design Highlights)", optional: true }
        - { heading: "## 关键术语 (Key Terminology)", optional: false }
    labels:
      definition:    { en: "Definition",    cn: "定义" }
      note:          { en: "Note",          cn: "注" }
      example:       { en: "Example",       cn: "示例" }
      figure:        { en: "Figure",        cn: "图" }
    tables:
      comparison:  { headers: ["特性 (Feature)", "方案A (Option A)", "方案B (Option B)"] }
      glossary:    { headers: ["术语 (Term)", "定义 (Definition)"] }
    stage1_hint: "Focus on architecture diagrams, configuration examples, protocol specifications, and design trade-offs."
    stage3_hint: "Use system comparison tables. Include architecture diagrams. Add configuration examples."
    stage4_hint: "Verify API/command syntax. Check diagram clarity. Validate version numbers."

  # ── Pure Mathematics ───────────────────────────────────────────────
  math_pure:
    description: "数学分析、代数、拓扑、数论、几何"
    content_types:
      - definition
      - theorem
      - lemma
      - corollary
      - proof
      - equation
      - example
      - derivation
      - note
      - figure
      - paragraph
    template:
      title: "# 第{chapter}章：{title_cn} (Chapter {chapter}: {title_en})"
      section: "## {number} {title_cn} ({title_en})"
      end_sections:
        - { heading: "## 定理汇总 (Theorem Summary)", optional: false }
        - { heading: "## 核心公式 (Key Formulas)", optional: true }
        - { heading: "## 典型例题 (Classic Problems)", optional: true }
        - { heading: "## 关键术语 (Key Terms)", optional: false }
    labels:
      definition:    { en: "Definition",    cn: "定义" }
      theorem:       { en: "Theorem",       cn: "定理" }
      lemma:         { en: "Lemma",         cn: "引理" }
      corollary:     { en: "Corollary",     cn: "推论" }
      proposition:   { en: "Proposition",   cn: "命题" }
      conjecture:    { en: "Conjecture",    cn: "猜想" }
      proof:         { en: "Proof",         cn: "证明" }
      remark:        { en: "Remark",        cn: "注记" }
      example:       { en: "Example",       cn: "例题" }
      note:          { en: "Note",          cn: "注" }
      figure:        { en: "Figure",        cn: "图" }
    tables:
      theorem_list:   { headers: ["定理 (Theorem)", "内容 (Statement)", "页码 (Page)"] }
      formula_list:   { headers: ["公式 (Formula)", "名称 (Name)", "条件 (Conditions)"] }
      glossary:       { headers: ["术语 (Term)", "定义 (Definition)"] }
    stage1_hint: "Pay special attention to Definition→Lemma→Proof→Corollary chains. Extract equation numbers and labels. Treat each step in a multi-step proof as a separate derivation block. Capture 'if and only if' (⟺) conditions precisely."
    stage3_hint: "Use theorem-summary tables. Render proof blocks with clear QED markers (∎/□). Add equation numbers in parentheses. Use remark/note blocks for important observations."
    stage4_hint: "Verify equation numbering is consistent across cross-references. Check QED markers at proof ends. Verify theorem numbering matches citations. Validate that 'iff' conditions are correctly rendered."

