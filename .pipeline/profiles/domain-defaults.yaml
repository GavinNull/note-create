      remark:        { en: "Remark",        cn: "注记" }
    tables:
      law_list:       { headers: ["定律 (Law)", "公式 (Formula)", "发现者 (Discovered by)", "适用条件 (Conditions)"] }
      constant_table: { headers: ["常数 (Constant)", "符号 (Symbol)", "数值 (Value)", "单位 (Unit)"] }
      unit_table:     { headers: ["物理量 (Quantity)", "单位 (Unit)", "量纲 (Dimension)"] }
      glossary:       { headers: ["术语 (Term)", "定义 (Definition)"] }
    stage1_hint: "Identify physical laws with names (Newton's, Coulomb's, Maxwell's). Extract equations with variable definitions. Capture experimental setups with procedures. Note physical constants with values and units. Distinguish laws (empirical) from principles (axiomatic) from derivations."
    stage3_hint: "Render law blocks with descriptive names. Include constant tables with SI units. Add experimental procedure steps. Use bold for vector quantities."
    stage4_hint: "Verify equation variable consistency. Check unit consistency across derivations. Validate constant values and units. Verify vector/scalar notation."

