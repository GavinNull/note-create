# ── Content Type Catalog (complete reference) ──────────────────────────
# All 24 content types available across domains:
content_type_catalog:
  universal:
    - { id: "definition",       description: "Formal definition of a term or concept" }
    - { id: "theorem",          description: "Theorem, lemma, corollary, proposition" }
    - { id: "code",             description: "Source code or pseudocode snippet" }
