      proof:         { en: "Derivation",    cn: "推导" }
      algorithm:     { en: "Algorithm",     cn: "算法" }
      example:       { en: "Example",       cn: "例题" }
      note:          { en: "Note",          cn: "注" }
      figure:        { en: "Figure",        cn: "图" }
