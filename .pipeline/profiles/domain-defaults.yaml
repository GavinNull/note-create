      comparison:     { headers: ["方法 (Method)", "优点 (Pros)", "缺点 (Cons)", "适用 (When)"] }
      glossary:       { headers: ["术语 (Term)", "定义 (Definition)"] }
    stage1_hint: "Extract algorithms as pseudocode. Capture model assumptions and constraints. Note data requirements and computational complexity."
    stage3_hint: "Include worked numerical examples. Add algorithm step-by-step traces. Use comparison tables for competing methods."
    stage4_hint: "Verify numerical accuracy in examples. Check algorithm step numbering. Validate formula cross-references."

