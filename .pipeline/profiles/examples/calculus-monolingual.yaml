# =============================================================================
# Example Profile: Calculus I (Monolingual English, No Code)
# =============================================================================
# Demonstrates: non-CS course, no code blocks, no complexity tables,
#              equation and derivation content types, monolingual output
# =============================================================================

profile:
  name: "calculus-monolingual"
  display: "Calculus I"
  description: "Monolingual English calculus course — no code, heavy on equations and proofs"
  domain: "math_pure"

  languages:
    source: "en"
    target: "same"            # Monolingual: notes stay in English
    annotation: null          # No bilingual annotations needed
    annotation_style: null
    field_suffix_source: "_en"
    field_suffix_target: "_en"

  source:
    chapter_pattern: "Chapter (\\d+)"
    section_pattern: "^(\\d+\\.\\d+)"       # 3.1, 3.2
    section_style: "dotted"
    code_language: null                     # No programming in this course!
    code_comment_style: null
    math: { inline: "$", display: "$$" }

  content_types:
    - definition       # Formal definitions (limit, derivative, integral...)
    - theorem          # Theorems (MVT, FTC, etc.)
    - example          # Worked examples (most important for calculus!)
    - equation         # Standalone important equations
    - derivation       # Step-by-step derivations
    - note             # Important remarks
    - figure           # Graphs and diagrams
    - paragraph        # Explanatory text

  template:
    title: "# Chapter {chapter}: {title_en}"
    epigraph: null                          # No epigraphs
    section: "## {number} {title_en}"       # "## 3.1 Limits and Continuity"
    subsection: "### {title_en}"
    separator: "---"
    toc_heading: "## Contents"
    toc_entry: "{idx}. [{number} {title_en}](#{anchor})"

    end_sections:
      - id: key_formulas
        heading: "## Key Formulas"
        optional: false
      - id: term_glossary
        heading: "## Key Terms"
        optional: false
      - id: practice_problems
        heading: "## Practice Problems"
        optional: true

  labels:
    definition:    { en: "Definition" }
    theorem:       { en: "Theorem" }
    lemma:         { en: "Lemma" }
    corollary:     { en: "Corollary" }
    proof:         { en: "Proof" }
    note:          { en: "Note" }
    example:       { en: "Example" }
    figure:        { en: "Figure" }

  tables:
    differentiation_rules:
      headers: ["Rule", "Function", "Derivative"]
    integration_table:
      headers: ["Integral", "Result", "Conditions"]
    term_glossary:
      headers: ["Term", "Definition"]

  formatting:
    definition_order: "target_only"         # No bilingual, just English
    term_annotation: "never"                # No cross-language annotations
    table_first_column_bold: true
    blank_lines_around_blocks: true

  images:
    path_pattern: "images/ch{chapter:02d}-{slug}.png"
    alt_text: "{description_en}"
    demo_link: null

  review:
    check_term_consistency: true
    check_latex: true
    check_code_comments: false              # No code to check
    check_missing_summaries: true
    punctuation:
      chinese_in_chinese_text: false
      no_html_tags: true

  terminology:
    limits:
      - { en: "Limit", en_alt: "Limit of a Function" }
      - { en: "Continuity", en_alt: "Continuous Function" }
      - { en: "Asymptote" }
      - { en: "Squeeze Theorem" }
      - { en: "Intermediate Value Theorem", en_alt: "IVT" }
    derivatives:
      - { en: "Derivative" }
      - { en: "Differentiation" }
      - { en: "Chain Rule" }
      - { en: "Product Rule" }
      - { en: "Quotient Rule" }
      - { en: "Implicit Differentiation" }
      - { en: "Related Rates" }
      - { en: "Mean Value Theorem", en_alt: "MVT" }
      - { en: "Rolle's Theorem" }
      - { en: "Critical Point" }
      - { en: "Inflection Point" }
      - { en: "Concavity" }
    integrals:
      - { en: "Integral" }
      - { en: "Antiderivative" }
      - { en: "Definite Integral" }
      - { en: "Indefinite Integral" }
      - { en: "Fundamental Theorem of Calculus", en_alt: "FTC" }
      - { en: "Riemann Sum" }
      - { en: "u-Substitution" }
      - { en: "Integration by Parts" }
      - { en: "Partial Fractions" }
      - { en: "Improper Integral" }
    applications:
      - { en: "Area Between Curves" }
      - { en: "Volume of Revolution" }
      - { en: "Arc Length" }
      - { en: "Surface Area" }
      - { en: "Work" }
      - { en: "Center of Mass" }
