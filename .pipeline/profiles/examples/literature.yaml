# =============================================================================
# Example Profile: Literary Analysis (Humanities, Bilingual CN/EN)
# =============================================================================
# Demonstrates: humanities domain, argument/quote/debate content types,
#              no math/code, thematic analysis structure
# =============================================================================

profile:
  name: "literature"
  display: "文学分析 (Literary Analysis)"
  description: "Humanities — literary criticism, close reading, thematic analysis, historical context"
  domain: "humanities"

  languages:
    source: "en"
    target: "zh-CN"
    annotation: "en"
    annotation_style: "parens"
    field_suffix_source: "_en"
    field_suffix_target: "_cn"

  source:
    chapter_pattern: "Chapter (\\d+)"
    section_pattern: "^(\\d+\\.\\d+)"
    section_style: "dotted"
    code_language: null
    code_comment_style: null
    math: { inline: "$", display: "$$" }

  content_types:
    - argument
    - quote
    - case_study
    - timeline
    - debate
    - definition
    - note
    - figure
    - paragraph

  template:
    title: "# {title_cn} ({title_en})"
    epigraph: "> \"{epigraph_en}\" — {epigraph_cn}"
    section: "## {title_cn} ({title_en})"
    subsection: "### {title_cn}"
    separator: "---"
    toc_heading: "## 目录"
    toc_entry: "{idx}. [{title_en} {title_cn}](#{anchor})"
    end_sections:
      - id: key_arguments
        heading: "## 核心论点 (Key Arguments)"
        optional: false
      - id: key_quotes
        heading: "## 关键引文 (Key Quotes)"
        optional: true
      - id: scholarly_debates
        heading: "## 学术争论 (Scholarly Debates)"
        optional: true
      - id: term_glossary
        heading: "## 关键术语 (Key Terms)"
        optional: false

  labels:
    argument:      { en: "Argument",      cn: "论点" }
    counterargument: { en: "Counterargument", cn: "反驳" }
    quote:         { en: "Quote",         cn: "引文" }
    context:       { en: "Context",       cn: "背景" }
    analysis:      { en: "Analysis",      cn: "分析" }
    theme:         { en: "Theme",         cn: "主题" }
    interpretation: { en: "Interpretation", cn: "解读" }
    debate:        { en: "Debate",        cn: "争论" }
    note:          { en: "Note",          cn: "注" }

  tables:
    argument_map:
      headers: ["论点 (Argument)", "支持证据 (Evidence)", "反对观点 (Counterargument)"]
    theme_analysis:
      headers: ["主题 (Theme)", "文本证据 (Textual Evidence)", "分析 (Analysis)"]
    timeline:
      headers: ["时间 (Date)", "事件 (Event)", "文学意义 (Literary Significance)"]
    term_glossary:
      headers: ["术语 (Term)", "定义 (Definition)"]

  formatting:
    definition_order: "en_first"
    term_annotation: "first_per_section"
    table_first_column_bold: true
    blank_lines_around_blocks: true

  review:
    check_term_consistency: true
    check_latex: false
    check_code_comments: false
    check_missing_summaries: true
    punctuation:
      chinese_in_chinese_text: true
      no_html_tags: true

  terminology:
    literary_theory:
      - { cn: "叙事学", en: "Narratology" }
      - { cn: "结构主义", en: "Structuralism" }
      - { cn: "后结构主义", en: "Post-structuralism" }
      - { cn: "解构主义", en: "Deconstruction" }
      - { cn: "女性主义批评", en: "Feminist Criticism" }
      - { cn: "马克思主义批评", en: "Marxist Criticism" }
      - { cn: "后殖民理论", en: "Postcolonial Theory" }
      - { cn: "精神分析批评", en: "Psychoanalytic Criticism" }
      - { cn: "新批评", en: "New Criticism" }
      - { cn: "读者反应理论", en: "Reader-Response Theory" }
      - { cn: "互文性", en: "Intertextuality" }
      - { cn: "经典", en: "Canon" }
    narrative_elements:
      - { cn: "叙述者", en: "Narrator" }
      - { cn: "不可靠叙述者", en: "Unreliable Narrator" }
      - { cn: "第一人称叙述", en: "First-Person Narration" }
      - { cn: "全知视角", en: "Omniscient Point of View" }
      - { cn: "自由间接引语", en: "Free Indirect Discourse" }
      - { cn: "故事", en: "Story / Fabula" }
      - { cn: "情节", en: "Plot / Sjuzhet" }
      - { cn: "倒叙", en: "Flashback / Analepsis" }
      - { cn: "预叙", en: "Flashforward / Prolepsis" }
      - { cn: "框架叙事", en: "Frame Narrative" }
    literary_devices:
      - { cn: "隐喻", en: "Metaphor" }
      - { cn: "明喻", en: "Simile" }
      - { cn: "象征", en: "Symbol" }
      - { cn: "意象", en: "Imagery" }
      - { cn: "反讽", en: "Irony" }
      - { cn: "寓言", en: "Allegory" }
      - { cn: "拟人", en: "Personification" }
      - { cn: "悖论", en: "Paradox" }
      - { cn: "典故", en: "Allusion" }
      - { cn: "多义性", en: "Ambiguity" }
    poetry:
      - { cn: "格律", en: "Meter" }
      - { cn: "押韵", en: "Rhyme" }
      - { cn: "抑扬格", en: "Iambic" }
      - { cn: "十四行诗", en: "Sonnet" }
      - { cn: "诗节", en: "Stanza" }
      - { cn: "跨行", en: "Enjambment" }
      - { cn: "头韵", en: "Alliteration" }
      - { cn: "拟声", en: "Onomatopoeia" }
    analysis_terms:
      - { cn: "细读", en: "Close Reading" }
      - { cn: "文本分析", en: "Textual Analysis" }
      - { cn: "语境化", en: "Contextualization" }
      - { cn: "人物塑造", en: "Characterization" }
      - { cn: "主角", en: "Protagonist" }
      - { cn: "对立角色", en: "Antagonist" }
      - { cn: "张力", en: "Tension" }
      - { cn: "高潮", en: "Climax" }
      - { cn: "结局", en: "Denouement" }
      - { cn: "主题", en: "Theme / Motif" }
