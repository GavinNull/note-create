# =============================================================================
# Example Profile: Algorithm Design (Bilingual CN/EN, Python)
# =============================================================================
# Demonstrates: different CS course, Python code, no § sections, different terminology
# =============================================================================

profile:
  name: "algorithms-bilingual"
  display: "算法设计与分析 (Algorithm Design & Analysis)"
  description: "Bilingual CN/EN algorithm design course using Python, dotted section numbering"
  domain: "cs_theory"

  languages:
    source: "en"
    target: "zh-CN"
    annotation: "en"
    annotation_style: "parens"
    field_suffix_source: "_en"
    field_suffix_target: "_cn"

  source:
    chapter_pattern: "Chapter (\\d+)"
    section_pattern: "^(\\d+\\.\\d+)"       # Dotted: 2.1, 2.2
    section_style: "dotted"
    code_language: "python"                  # Python, not C!
    code_comment_style: "# %s"
    math: { inline: "$", display: "$$" }

  content_types:
    - definition
    - theorem
    - code
    - complexity_table
    - example
    - comparison_table
    - note
    - figure
    - derivation
    - paragraph

  template:
    title: "# 第{chapter}章：{title_cn} (Chapter {chapter}: {title_en})"
    epigraph: "> **{epigraph_en}** {epigraph_cn}"
    section: "## {number} {title_cn} ({title_en})"    # 2.1 not §2.1
    subsection: "### {title_cn}"
    separator: "---"
    toc_heading: "## 目录"
    toc_entry: "{idx}. [{number} {title_en} {title_cn}](#{anchor})"

    end_sections:
      - id: algorithm_summary
        heading: "## 算法总结 (Algorithm Summary)"
        optional: true
      - id: term_glossary
        heading: "## 关键术语 (Key Terminology)"
        optional: false

  labels:
    definition:    { en: "Definition",    cn: "定义" }
    theorem:       { en: "Theorem",       cn: "定理" }
    lemma:         { en: "Lemma",         cn: "引理" }
    proof:         { en: "Proof",         cn: "证明" }
    note:          { en: "Note",          cn: "注" }
    example:       { en: "Example",       cn: "示例" }

  tables:
    complexity:
      headers: ["情况 (Case)", "条件 (Condition)", "时间复杂度 (Time Complexity)"]
    algorithm_comparison:
      headers: ["算法 (Algorithm)", "最坏时间 (Worst)", "平均时间 (Average)",
                "空间 (Space)", "备注 (Notes)"]
    term_glossary:
      headers: ["术语 (Term)", "定义 (Definition)"]

  formatting:
    definition_order: "en_first"
    term_annotation: "first_per_section"
    table_first_column_bold: true
    blank_lines_around_blocks: true

  images:
    path_pattern: "images/ch{chapter:02d}-{slug}.png"
    alt_text: "{description_cn}"
    demo_link: null                           # No interactive demos

  review:
    check_term_consistency: true
    check_latex: true
    check_code_comments: true
    check_missing_summaries: true
    punctuation:
      chinese_in_chinese_text: true
      no_html_tags: true

  terminology:
    analysis:
      - { cn: "时间复杂度", en: "Time Complexity" }
      - { cn: "空间复杂度", en: "Space Complexity" }
      - { cn: "最坏情况", en: "Worst Case" }
      - { cn: "最好情况", en: "Best Case" }
      - { cn: "平均情况", en: "Average Case" }
      - { cn: "平摊分析", en: "Amortized Analysis" }
      - { cn: "递推关系", en: "Recurrence Relation" }
    paradigms:
      - { cn: "分治法", en: "Divide and Conquer" }
      - { cn: "贪心算法", en: "Greedy Algorithm" }
      - { cn: "动态规划", en: "Dynamic Programming" }
      - { cn: "回溯法", en: "Backtracking" }
      - { cn: "分支限界", en: "Branch and Bound" }
      - { cn: "随机化算法", en: "Randomized Algorithm" }
      - { cn: "近似算法", en: "Approximation Algorithm" }
      - { cn: "在线算法", en: "Online Algorithm" }
    graph_algorithms:
      - { cn: "深度优先搜索", en: "DFS" }
      - { cn: "广度优先搜索", en: "BFS" }
      - { cn: "最短路径", en: "Shortest Path" }
      - { cn: "最小生成树", en: "Minimum Spanning Tree" }
      - { cn: "网络流", en: "Network Flow" }
      - { cn: "最大流", en: "Max Flow" }
      - { cn: "二分图匹配", en: "Bipartite Matching" }
    np_theory:
      - { cn: "NP完全性", en: "NP-Completeness" }
      - { cn: "多项式时间", en: "Polynomial Time" }
      - { cn: "归约", en: "Reduction" }
      - { cn: "判定问题", en: "Decision Problem" }
      - { cn: "优化问题", en: "Optimization Problem" }
    math_terms:
      - { cn: "引理", en: "Lemma" }
      - { cn: "定理", en: "Theorem" }
      - { cn: "证明", en: "Proof" }
      - { cn: "归纳法", en: "Induction" }
      - { cn: "反证法", en: "Proof by Contradiction" }
