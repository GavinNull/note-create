# =============================================================================
# Example Profile: Organic Chemistry (Chemistry, Bilingual CN/EN)
# =============================================================================
# Demonstrates: chemistry domain, reaction mechanisms, chemical equations,
#              experiment blocks, IUPAC nomenclature, safety cautions
# =============================================================================

profile:
  name: "organic-chemistry"
  display: "有机化学 (Organic Chemistry)"
  description: "Chemistry — organic reactions, mechanisms, synthesis, spectroscopy, lab techniques"
  domain: "chemistry"

  languages:
    source: "en"
    target: "zh-CN"
    annotation: "en"
    annotation_style: "parens"
    field_suffix_source: "_en"
    field_suffix_target: "_cn"

  source:
    chapter_pattern: "Chapter (\\d+)"
    section_pattern: "^(\\d+\\.\\d+)"
    section_style: "dotted"
    code_language: null
    code_comment_style: null
    math: { inline: "$", display: "$$" }

  content_types:
    - definition
    - law
    - equation
    - mechanism
    - example
    - experiment
    - constant_table
    - note
    - figure
    - comparison_table
    - paragraph

  template:
    title: "# 第{chapter}章：{title_cn} (Chapter {chapter}: {title_en})"
    epigraph: null
    section: "## {number} {title_cn} ({title_en})"
    subsection: "### {title_cn}"
    separator: "---"
    toc_heading: "## 目录"
    toc_entry: "{idx}. [{number} {title_en} {title_cn}](#{anchor})"
    end_sections:
      - id: key_reactions
        heading: "## 核心反应 (Key Reactions)"
        optional: false
      - id: mechanisms
        heading: "## 反应机理 (Reaction Mechanisms)"
        optional: true
      - id: lab_highlights
        heading: "## 实验要点 (Lab Highlights)"
        optional: true
      - id: spectroscopy
        heading: "## 光谱数据 (Spectral Data)"
        optional: true
      - id: term_glossary
        heading: "## 关键术语 (Key Terms)"
        optional: false

  labels:
    definition:    { en: "Definition",    cn: "定义" }
    law:           { en: "Law",           cn: "定律" }
    rule:          { en: "Rule",          cn: "规则" }
    mechanism:     { en: "Mechanism",     cn: "机理" }
    example:       { en: "Example",       cn: "示例" }
    experiment:    { en: "Experiment",    cn: "实验" }
    note:          { en: "Note",          cn: "注" }
    caution:       { en: "Caution",       cn: "安全注意" }
    figure:        { en: "Figure",        cn: "图" }

  tables:
    reaction_list:
      headers: ["反应 (Reaction)", "条件 (Conditions)", "产率 (Yield)", "机理 (Mechanism)"]
    reagent_table:
      headers: ["试剂 (Reagent)", "结构 (Structure)", "用途 (Use)", "注意事项 (Cautions)"]
    spectroscopy:
      headers: ["官能团 (Group)", "IR (cm⁻¹)", "¹H NMR (δ)", "¹³C NMR (δ)"]
    constant_table:
      headers: ["常数 (Constant)", "符号 (Symbol)", "数值 (Value)", "单位 (Unit)"]
    term_glossary:
      headers: ["术语 (Term)", "定义 (Definition)"]

  formatting:
    definition_order: "en_first"
    term_annotation: "first_per_section"
    table_first_column_bold: true
    blank_lines_around_blocks: true

  review:
    check_term_consistency: true
    check_latex: true
    check_code_comments: false
    check_missing_summaries: true
    punctuation:
      chinese_in_chinese_text: true
      no_html_tags: true

  terminology:
    fundamentals:
      - { cn: "原子轨道", en: "Atomic Orbital" }
      - { cn: "分子轨道", en: "Molecular Orbital" }
      - { cn: "杂化", en: "Hybridization" }
      - { cn: "电负性", en: "Electronegativity" }
      - { cn: "极性", en: "Polarity" }
      - { cn: "共振", en: "Resonance" }
      - { cn: "异构体", en: "Isomer" }
      - { cn: "构象", en: "Conformation" }
      - { cn: "手性", en: "Chirality" }
      - { cn: "对映体", en: "Enantiomer" }
      - { cn: "立体化学", en: "Stereochemistry" }
      - { cn: "诱导效应", en: "Inductive Effect" }
      - { cn: "共轭效应", en: "Conjugation Effect" }
    reaction_types:
      - { cn: "取代反应", en: "Substitution Reaction" }
      - { cn: "消除反应", en: "Elimination Reaction" }
      - { cn: "加成反应", en: "Addition Reaction" }
      - { cn: "缩合反应", en: "Condensation Reaction" }
      - { cn: "氧化还原反应", en: "Redox Reaction" }
      - { cn: "重排反应", en: "Rearrangement Reaction" }
      - { cn: "周环反应", en: "Pericyclic Reaction" }
      - { cn: "自由基反应", en: "Radical Reaction" }
    mechanisms:
      - { cn: "SN1反应", en: "SN1 Reaction" }
      - { cn: "SN2反应", en: "SN2 Reaction" }
      - { cn: "E1反应", en: "E1 Reaction" }
      - { cn: "E2反应", en: "E2 Reaction" }
      - { cn: "亲电加成", en: "Electrophilic Addition" }
      - { cn: "亲电取代", en: "Electrophilic Substitution" }
      - { cn: "亲核加成", en: "Nucleophilic Addition" }
      - { cn: "亲核取代", en: "Nucleophilic Substitution" }
    reagents:
      - { cn: "亲核试剂", en: "Nucleophile" }
      - { cn: "亲电试剂", en: "Electrophile" }
      - { cn: "催化剂", en: "Catalyst" }
      - { cn: "格氏试剂", en: "Grignard Reagent" }
      - { cn: "氢化铝锂", en: "Lithium Aluminum Hydride (LAH)" }
      - { cn: "硼氢化钠", en: "Sodium Borohydride" }
    spectroscopy:
      - { cn: "红外光谱", en: "IR Spectroscopy" }
      - { cn: "核磁共振", en: "NMR Spectroscopy" }
      - { cn: "质谱", en: "Mass Spectrometry" }
      - { cn: "紫外可见光谱", en: "UV-Vis Spectroscopy" }
      - { cn: "化学位移", en: "Chemical Shift" }
      - { cn: "耦合常数", en: "Coupling Constant" }
    lab_terms:
      - { cn: "回流", en: "Reflux" }
      - { cn: "蒸馏", en: "Distillation" }
      - { cn: "萃取", en: "Extraction" }
      - { cn: "色谱", en: "Chromatography" }
      - { cn: "重结晶", en: "Recrystallization" }
      - { cn: "薄层色谱", en: "TLC (Thin Layer Chromatography)" }
      - { cn: "柱色谱", en: "Column Chromatography" }
      - { cn: "无水条件", en: "Anhydrous Conditions" }
      - { cn: "惰性气氛", en: "Inert Atmosphere" }
