profile:
  name: "cs-test"
  display: "CS Fundamentals (Test)"
  description: "Test profile for CS theory domain"
  domain: "cs_theory"
  languages:
    source: "en"
    target: "zh-CN"
    annotation: "en"
    annotation_style: "parens"
    field_suffix_source: "_en"
    field_suffix_target: "_cn"
  source:
    chapter_pattern: "Chapter (\\d+)"
    section_pattern: "^(\\d+\\.\\d+)"
    section_style: "dotted"
    code_language: "c"
    code_comment_style: "/* %s */"
    math: { inline: "$", display: "$$" }
  content_types:
    - definition
    - theorem
    - code
    - complexity_table
    - example
    - note
    - figure
    - derivation
    - paragraph
  template:
    title: "# 第{chapter}章：{title_cn} (Chapter {chapter}: {title_en})"
    epigraph: null
    section: "## {number} {title_cn} ({title_en})"
    subsection: "### {title_cn} ({title_en})"
    separator: "---"
    toc_heading: "## 目录"
    toc_entry: "{idx}. [{section} {title_en} {title_cn}](#{anchor})"
    end_sections:
      - id: term_glossary
        heading: "## 关键术语 (Key Terms)"
        optional: false
      - id: highlights
        heading: "## 本章要点 (Chapter Highlights)"
        optional: true
  labels:
    definition: { en: "Definition", cn: "定义" }
    theorem: { en: "Theorem", cn: "定理" }
    proof: { en: "Proof", cn: "证明" }
    note: { en: "Note", cn: "注" }
    example: { en: "Example", cn: "示例" }
    figure: { en: "Figure", cn: "图" }
  tables:
    complexity:
      headers: ["情况 (Case)", "条件 (Condition)", "时间复杂度 (Time Complexity)"]
    term_glossary:
      headers: ["术语 (Term)", "定义 (Definition)"]
  formatting:
    definition_order: "en_first"
    term_annotation: "first_per_section"
    table_first_column_bold: true
    blank_lines_around_blocks: true
  review:
    check_term_consistency: true
    check_latex: true
    check_code_comments: true
    check_missing_summaries: true
    punctuation:
      chinese_in_chinese_text: true
      no_html_tags: true
  terminology:
    trees:
      - { cn: "二叉树", en: "Binary Tree" }
      - { cn: "二叉搜索树", en: "Binary Search Tree (BST)" }
      - { cn: "平衡树", en: "Balanced Tree" }
      - { cn: "根", en: "Root" }
      - { cn: "叶子节点", en: "Leaf Node" }
      - { cn: "左子树", en: "Left Subtree" }
      - { cn: "右子树", en: "Right Subtree" }
      - { cn: "高度", en: "Height" }
      - { cn: "深度", en: "Depth" }
    operations:
      - { cn: "查找", en: "Search" }
      - { cn: "插入", en: "Insertion" }
      - { cn: "删除", en: "Deletion" }
      - { cn: "遍历", en: "Traversal" }
      - { cn: "中序后继", en: "Inorder Successor" }
    traversal:
      - { cn: "中序遍历", en: "Inorder Traversal" }
      - { cn: "先序遍历", en: "Preorder Traversal" }
      - { cn: "后序遍历", en: "Postorder Traversal" }
      - { cn: "深度优先搜索", en: "DFS (Depth-First Search)" }
    analysis:
      - { cn: "时间复杂度", en: "Time Complexity" }
      - { cn: "最坏情况", en: "Worst Case" }
      - { cn: "最好情况", en: "Best Case" }
      - { cn: "退化树", en: "Degenerate Tree" }
      - { cn: "大O记号", en: "Big-O Notation" }
      - { cn: "栈溢出", en: "Stack Overflow" }
